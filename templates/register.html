{% extends "base.html" %}
{% block title %}Cadastro - PrintFarm Pro{% endblock %}
{% block content %}
<div class="login-page">
    <div class="login-card">
        <div class="text-center mb-4">
            <i class="bi bi-person-plus" style="font-size: 3rem; color: #6366f1;"></i>
            <h3 class="mt-3 fw-bold">Criar Conta</h3>
        </div>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nome Completo</label>
                <input type="text" name="full_name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Senha</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                <i class="bi bi-person-check me-2"></i>Cadastrar
            </button>
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('login') }}" class="text-decoration-none">Já tenho conta</a>
        </div>
    </div>
</div>
{% endblock %}
