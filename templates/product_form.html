{% extends "base.html" %}
{% block title %}{{ 'Editar' if product else 'Novo' }} Produto - PrintFarm Pro{% endblock %}
{% block content %}
<div class="topbar">
    <h4 class="mb-0 fw-bold">{{ 'Editar' if product else 'Novo' }} Produto</h4>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="table-card p-4">
            <form method="POST">
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label">Nome *</label>
                        <input type="text" name="name" class="form-control" value="{{ product.name if product else '' }}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Categoria</label>
                        <select name="category" class="form-select">
                            <option value="">Selecione...</option>
                            <option value="Decoracao" {{ 'selected' if product and product.category == 'Decoracao' else '' }}>Decoração</option>
                            <option value="Utilitarios" {{ 'selected' if product and product.category == 'Utilitarios' else '' }}>Utilitários</option>
                            <option value="Cosplay" {{ 'selected' if product and product.category == 'Cosplay' else '' }}>Cosplay</option>
                            <option value="Prototipos" {{ 'selected' if product and product.category == 'Prototipos' else '' }}>Protótipos</option>
                            <option value="Brinquedos" {{ 'selected' if product and product.category == 'Brinquedos' else '' }}>Brinquedos</option>
                            <option value="Organizadores" {{ 'selected' if product and product.category == 'Organizadores' else '' }}>Organizadores</option>
                            <option value="Suportes" {{ 'selected' if product and product.category == 'Suportes' else '' }}>Suportes</option>
                            <option value="Chaveiros" {{ 'selected' if product and product.category == 'Chaveiros' else '' }}>Chaveiros</option>
                            <option value="Luminarias" {{ 'selected' if product and product.category == 'Luminarias' else '' }}>Luminárias</option>
                            <option value="Outro" {{ 'selected' if product and product.category == 'Outro' else '' }}>Outro</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Descrição</label>
                        <textarea name="description" class="form-control" rows="2">{{ product.description if product else '' }}</textarea>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Tags (separadas por vírgula)</label>
                        <input type="text" name="tags" class="form-control" value="{{ product.tags if product else '' }}" placeholder="Ex: personalizado, presente, casa">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Filamento *</label>
                        <select name="filament_id" class="form-select" required>
                            <option value="">Selecione...</option>
                            {% for f in filaments %}
                            <option value="{{ f.id }}" {{ 'selected' if product and product.filament_id == f.id else '' }}>{{ f.name }} - {{ f.material }} {{ f.color }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Máquina *</label>
                        <select name="machine_id" class="form-select" required>
                            <option value="">Selecione...</option>
                            {% for m in machines %}
                            <option value="{{ m.id }}" {{ 'selected' if product and product.machine_id == m.id else '' }}>{{ m.name }} - {{ m.brand }} {{ m.model }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Tempo de Impressão (h) *</label>
                        <input type="number" step="0.1" name="print_time_hours" class="form-control" value="{{ product.print_time_hours if product else '' }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Peso do Filamento (g) *</label>
                        <input type="number" step="0.1" name="filament_weight_g" class="form-control" value="{{ product.filament_weight_g if product else '' }}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Altura de Camada (mm)</label>
                        <select name="layer_height" class="form-select">
                            <option value="0.1" {{ 'selected' if product and product.layer_height == 0.1 else '' }}>0.1mm</option>
                            <option value="0.2" {{ 'selected' if product and product.layer_height == 0.2 else '' }} selected>0.2mm</option>
                            <option value="0.3" {{ 'selected' if product and product.layer_height == 0.3 else '' }}>0.3mm</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Preenchimento (%)</label>
                        <select name="infill_percent" class="form-select">
                            <option value="10" {{ 'selected' if product and product.infill_percent == 10 else '' }}>10%</option>
                            <option value="20" {{ 'selected' if product and product.infill_percent == 20 else '' }} selected>20%</option>
                            <option value="50" {{ 'selected' if product and product.infill_percent == 50 else '' }}>50%</option>
                            <option value="100" {{ 'selected' if product and product.infill_percent == 100 else '' }}>100%</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Paredes</label>
                        <select name="wall_count" class="form-select">
                            <option value="2" {{ 'selected' if product and product.wall_count == 2 else '' }}>2</option>
                            <option value="3" {{ 'selected' if product and product.wall_count == 3 else '' }} selected>3</option>
                            <option value="4" {{ 'selected' if product and product.wall_count == 4 else '' }}>4</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Suporte?</label>
                        <select name="support_needed" class="form-select">
                            <option value="0" {{ 'selected' if product and product.support_needed == 0 else '' }} selected>Não</option>
                            <option value="1" {{ 'selected' if product and product.support_needed == 1 else '' }}>Sim</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Tipo de Suporte</label>
                        <input type="text" name="support_type" class="form-control" value="{{ product.support_type if product else '' }}" placeholder="Ex: Tree, Normal">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Custo Base (R$)</label>
                        <input type="number" step="0.01" name="base_cost" class="form-control" value="{{ product.base_cost if product else '' }}" readonly>
                        <small class="text-muted">Calculado automaticamente</small>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Preço Sugerido (R$)</label>
                        <input type="number" step="0.01" name="suggested_price" class="form-control" value="{{ product.suggested_price if product else '' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Margem de Lucro (%)</label>
                        <input type="number" name="profit_margin" class="form-control" value="{{ product.profit_margin if product else 50 }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Visibilidade</label>
                        <select name="is_public" class="form-select">
                            <option value="1" {{ 'selected' if product and product.is_public == 1 else '' }} selected>Público</option>
                            <option value="0" {{ 'selected' if product and product.is_public == 0 else '' }}>Privado</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <div class="form-check">
                            <input type="checkbox" name="featured" class="form-check-input" value="1" {{ 'checked' if product and product.featured == 1 else '' }}>
                            <label class="form-check-label">Destacar no portfólio</label>
                        </div>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Observações</label>
                        <textarea name="notes" class="form-control" rows="2">{{ product.notes if product else '' }}</textarea>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>Salvar
                        </button>
                        <a href="{{ url_for('products') }}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
