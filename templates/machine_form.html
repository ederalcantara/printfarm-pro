{% extends "base.html" %}
{% block title %}{{ 'Editar' if machine else 'Nova' }} Máquina - PrintFarm Pro{% endblock %}
{% block content %}
<div class="topbar">
    <h4 class="mb-0 fw-bold">{{ 'Editar' if machine else 'Nova' }} Máquina</h4>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="table-card p-4">
            <form method="POST">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Nome *</label>
                        <input type="text" name="name" class="form-control" value="{{ machine.name if machine else '' }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Status</label>
                        <select name="status" class="form-select">
                            <option value="idle" {{ 'selected' if machine and machine.status == 'idle' else '' }}>Livre</option>
                            <option value="printing" {{ 'selected' if machine and machine.status == 'printing' else '' }}>Imprimindo</option>
                            <option value="maintenance" {{ 'selected' if machine and machine.status == 'maintenance' else '' }}>Manutenção</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Marca *</label>
                        <select name="brand" class="form-select" required>
                            <option value="">Selecione...</option>
                            <option value="Creality" {{ 'selected' if machine and machine.brand == 'Creality' else '' }}>Creality</option>
                            <option value="Prusa" {{ 'selected' if machine and machine.brand == 'Prusa' else '' }}>Prusa</option>
                            <option value="Anycubic" {{ 'selected' if machine and machine.brand == 'Anycubic' else '' }}>Anycubic</option>
                            <option value="Elegoo" {{ 'selected' if machine and machine.brand == 'Elegoo' else '' }}>Elegoo</option>
                            <option value="Bambu Lab" {{ 'selected' if machine and machine.brand == 'Bambu Lab' else '' }}>Bambu Lab</option>
                            <option value="Flashforge" {{ 'selected' if machine and machine.brand == 'Flashforge' else '' }}>Flashforge</option>
                            <option value="Artillery" {{ 'selected' if machine and machine.brand == 'Artillery' else '' }}>Artillery</option>
                            <option value="Voron" {{ 'selected' if machine and machine.brand == 'Voron' else '' }}>Voron</option>
                            <option value="Outra" {{ 'selected' if machine and machine.brand == 'Outra' else '' }}>Outra</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Modelo *</label>
                        <input type="text" name="model" class="form-control" value="{{ machine.model if machine else '' }}" required placeholder="Ex: Ender 3 V2">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Número de Série</label>
                        <input type="text" name="serial_number" class="form-control" value="{{ machine.serial_number if machine else '' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Diâmetro do Bico (mm)</label>
                        <input type="number" step="0.01" name="nozzle_diameter" class="form-control" value="{{ machine.nozzle_diameter if machine else 0.4 }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Mesa X (mm)</label>
                        <input type="number" name="bed_size_x" class="form-control" value="{{ machine.bed_size_x if machine else 220 }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Mesa Y (mm)</label>
                        <input type="number" name="bed_size_y" class="form-control" value="{{ machine.bed_size_y if machine else 220 }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Mesa Z (mm)</label>
                        <input type="number" name="bed_size_z" class="form-control" value="{{ machine.bed_size_z if machine else 250 }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Temp. Máx. Nozzle (°C)</label>
                        <input type="number" name="max_temp_nozzle" class="form-control" value="{{ machine.max_temp_nozzle if machine else 260 }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Temp. Máx. Mesa (°C)</label>
                        <input type="number" name="max_temp_bed" class="form-control" value="{{ machine.max_temp_bed if machine else 110 }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Filamentos Suportados</label>
                        <input type="text" name="filament_types" class="form-control" value="{{ machine.filament_types if machine else 'PLA,ABS,PETG' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Data de Compra</label>
                        <input type="date" name="purchase_date" class="form-control" value="{{ machine.purchase_date if machine else '' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Preço de Compra (R$)</label>
                        <input type="number" step="0.01" name="purchase_price" class="form-control" value="{{ machine.purchase_price if machine else '' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Horas de Uso</label>
                        <input type="number" step="0.1" name="hours_used" class="form-control" value="{{ machine.hours_used if machine else 0 }}">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Observações</label>
                        <textarea name="notes" class="form-control" rows="3">{{ machine.notes if machine else '' }}</textarea>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>Salvar
                        </button>
                        <a href="{{ url_for('machines') }}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
