{% extends "base.html" %}
{% block title %}Login - PrintFarm Pro{% endblock %}
{% block content %}
<div class="login-page">
    <div class="login-card">
        <div class="text-center mb-4">
            <i class="bi bi-printer-fill" style="font-size: 3rem; color: #6366f1;"></i>
            <h3 class="mt-3 fw-bold">PrintFarm Pro</h3>
            <p class="text-muted">Sistema de Gestão para Fazendas de Impressão 3D</p>
        </div>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <input type="text" name="username" class="form-control" required placeholder="Digite seu usuário">
            </div>
            <div class="mb-4">
                <label class="form-label">Senha</label>
                <input type="password" name="password" class="form-control" required placeholder="Digite sua senha">
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
            </button>
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('register') }}" class="text-decoration-none">Criar nova conta</a>
        </div>
        <div class="mt-4 p-3 bg-light rounded">
            <small class="text-muted">
                <strong>Login padrão:</strong><br>
                Usuário: <code>admin</code><br>
                Senha: <code>admin123</code>
            </small>
        </div>
    </div>
</div>
{% endblock %}
