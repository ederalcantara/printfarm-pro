{% extends "base.html" %}
{% block title %}Configurações de Custo - PrintFarm Pro{% endblock %}
{% block content %}
<div class="topbar">
    <h4 class="mb-0 fw-bold"><i class="bi bi-gear me-2"></i>Configurações de Custo</h4>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="table-card p-4">
            <form method="POST">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Custo da Energia (R$/kWh)</label>
                        <input type="number" step="0.01" name="electricity_cost_per_kwh" class="form-control" value="{{ settings.electricity_cost_per_kwh }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Mão de Obra (R$/hora)</label>
                        <input type="number" step="0.01" name="labor_cost_per_hour" class="form-control" value="{{ settings.labor_cost_per_hour }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Depreciação Máquina (R$/hora)</label>
                        <input type="number" step="0.01" name="machine_depreciation_per_hour" class="form-control" value="{{ settings.machine_depreciation_per_hour }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Manutenção (R$/hora)</label>
                        <input type="number" step="0.01" name="maintenance_cost_per_hour" class="form-control" value="{{ settings.maintenance_cost_per_hour }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Taxa de Falhas (%)</label>
                        <input type="number" step="0.1" name="failed_print_rate" class="form-control" value="{{ settings.failed_print_rate }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Overhead (%)</label>
                        <input type="number" step="0.1" name="overhead_percent" class="form-control" value="{{ settings.overhead_percent }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Margem Mínima de Lucro (%)</label>
                        <input type="number" step="0.1" name="min_profit_margin" class="form-control" value="{{ settings.min_profit_margin }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Frete Padrão (R$)</label>
                        <input type="number" step="0.01" name="default_shipping_cost" class="form-control" value="{{ settings.default_shipping_cost }}">
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>Salvar Configurações
                        </button>
                        <a href="{{ url_for('calculator') }}" class="btn btn-outline-secondary">Voltar</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
