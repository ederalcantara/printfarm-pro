{% extends "base.html" %}
{% block title %}{{ 'Editar' if filament else 'Novo' }} Filamento - PrintFarm Pro{% endblock %}
{% block content %}
<div class="topbar">
    <h4 class="mb-0 fw-bold">{{ 'Editar' if filament else 'Novo' }} Filamento</h4>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="table-card p-4">
            <form method="POST">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Nome *</label>
                        <input type="text" name="name" class="form-control" value="{{ filament.name if filament else '' }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Marca *</label>
                        <select name="brand" class="form-select" required>
                            <option value="">Selecione...</option>
                            <option value="3D Lab" {{ 'selected' if filament and filament.brand == '3D Lab' else '' }}>3D Lab</option>
                            <option value="3D Fila" {{ 'selected' if filament and filament.brand == '3D Fila' else '' }}>3D Fila</option>
                            <option value="Voolt" {{ 'selected' if filament and filament.brand == 'Voolt' else '' }}>Voolt</option>
                            <option value="Cliever" {{ 'selected' if filament and filament.brand == 'Cliever' else '' }}>Cliever</option>
                            <option value="GTMax3D" {{ 'selected' if filament and filament.brand == 'GTMax3D' else '' }}>GTMax3D</option>
                            <option value="eSun" {{ 'selected' if filament and filament.brand == 'eSun' else '' }}>eSun</option>
                            <option value="Prusament" {{ 'selected' if filament and filament.brand == 'Prusament' else '' }}>Prusament</option>
                            <option value="Polymaker" {{ 'selected' if filament and filament.brand == 'Polymaker' else '' }}>Polymaker</option>
                            <option value="Hatchbox" {{ 'selected' if filament and filament.brand == 'Hatchbox' else '' }}>Hatchbox</option>
                            <option value="Outra" {{ 'selected' if filament and filament.brand == 'Outra' else '' }}>Outra</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Material *</label>
                        <select name="material" class="form-select" required>
                            <option value="">Selecione...</option>
                            <option value="PLA" {{ 'selected' if filament and filament.material == 'PLA' else '' }}>PLA</option>
                            <option value="ABS" {{ 'selected' if filament and filament.material == 'ABS' else '' }}>ABS</option>
                            <option value="PETG" {{ 'selected' if filament and filament.material == 'PETG' else '' }}>PETG</option>
                            <option value="TPU" {{ 'selected' if filament and filament.material == 'TPU' else '' }}>TPU (Flexível)</option>
                            <option value="ASA" {{ 'selected' if filament and filament.material == 'ASA' else '' }}>ASA</option>
                            <option value="Nylon" {{ 'selected' if filament and filament.material == 'Nylon' else '' }}>Nylon</option>
                            <option value="PC" {{ 'selected' if filament and filament.material == 'PC' else '' }}>PC (Policarbonato)</option>
                            <option value="Resina" {{ 'selected' if filament and filament.material == 'Resina' else '' }}>Resina</option>
                            <option value="Madeira" {{ 'selected' if filament and filament.material == 'Madeira' else '' }}>Madeira</option>
                            <option value="Metal" {{ 'selected' if filament and filament.material == 'Metal' else '' }}>Metal</option>
                            <option value="Carbono" {{ 'selected' if filament and filament.material == 'Carbono' else '' }}>Fibra de Carbono</option>
                            <option value="Outro" {{ 'selected' if filament and filament.material == 'Outro' else '' }}>Outro</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Cor *</label>
                        <input type="text" name="color" class="form-control" value="{{ filament.color if filament else '' }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Cor (Hex)</label>
                        <input type="color" name="color_hex" class="form-control" value="{{ filament.color_hex if filament else '#FF6B35' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Diâmetro (mm)</label>
                        <select name="diameter" class="form-select">
                            <option value="1.75" {{ 'selected' if filament and filament.diameter == 1.75 else '' }}>1.75mm</option>
                            <option value="2.85" {{ 'selected' if filament and filament.diameter == 2.85 else '' }}>2.85mm</option>
                            <option value="3.00" {{ 'selected' if filament and filament.diameter == 3.00 else '' }}>3.00mm</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Peso Total (kg)</label>
                        <input type="number" step="0.01" name="weight_kg" class="form-control" value="{{ filament.weight_kg if filament else 1.0 }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Peso Restante (kg)</label>
                        <input type="number" step="0.01" name="weight_remaining_kg" class="form-control" value="{{ filament.weight_remaining_kg if filament else 1.0 }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Preço por kg (R$) *</label>
                        <input type="number" step="0.01" name="price_per_kg" class="form-control" value="{{ filament.price_per_kg if filament else '' }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Preço do Carretel (R$)</label>
                        <input type="number" step="0.01" name="spool_price" class="form-control" value="{{ filament.spool_price if filament else '' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Temp. Nozzle</label>
                        <input type="text" name="temperature_range" class="form-control" value="{{ filament.temperature_range if filament else '' }}" placeholder="Ex: 190-220°C">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Temp. Mesa</label>
                        <input type="text" name="bed_temperature" class="form-control" value="{{ filament.bed_temperature if filament else '' }}" placeholder="Ex: 50-60°C">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">SKU/Código</label>
                        <input type="text" name="sku" class="form-control" value="{{ filament.sku if filament else '' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Fornecedor</label>
                        <input type="text" name="supplier" class="form-control" value="{{ filament.supplier if filament else '' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Localização</label>
                        <input type="text" name="location" class="form-control" value="{{ filament.location if filament else '' }}" placeholder="Ex: Prateleira A1">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Estoque Mínimo (kg)</label>
                        <input type="number" step="0.01" name="min_stock" class="form-control" value="{{ filament.min_stock if filament else 0.2 }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Status</label>
                        <select name="status" class="form-select">
                            <option value="available" {{ 'selected' if filament and filament.status == 'available' else '' }}>Disponível</option>
                            <option value="finished" {{ 'selected' if filament and filament.status == 'finished' else '' }}>Acabado</option>
                            <option value="ordered" {{ 'selected' if filament and filament.status == 'ordered' else '' }}>Pedido</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Observações</label>
                        <textarea name="notes" class="form-control" rows="2">{{ filament.notes if filament else '' }}</textarea>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>Salvar
                        </button>
                        <a href="{{ url_for('filaments') }}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
