{% extends "base.html" %}
{% block title %}Gerar Post - PrintFarm Pro{% endblock %}
{% block content %}
<div class="topbar">
    <h4 class="mb-0 fw-bold"><i class="bi bi-magic me-2"></i>Gerar Post de Marketing</h4>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="table-card p-4">
            <form method="POST">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Produto *</label>
                        <select name="product_id" class="form-select" required>
                            <option value="">Selecione...</option>
                            {% for p in products %}
                            <option value="{{ p.id }}">{{ p.name }} - R$ {{ "%.2f"|format(p.suggested_price or 0) }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Plataforma *</label>
                        <select name="platform" class="form-select" required>
                            <option value="instagram">Instagram</option>
                            <option value="facebook">Facebook</option>
                            <option value="whatsapp">WhatsApp</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-magic me-2"></i>Gerar Conteúdo
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
